<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broccoli Facts | Irreverent Engineering</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #191a1f;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #c5fb29;
            text-decoration: none;
            font-weight: bold;
            z-index: 100;
        }

        .background-broccoli {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: -1;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><text x="50%" y="50%" font-size="50" text-anchor="middle" dominant-baseline="middle">🥦</text></svg>');
            background-repeat: repeat;
            opacity: 0.2;
            animation: moveBroccoli 10s linear infinite;
            pointer-events: none;
        }

        @keyframes moveBroccoli {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, -100px); }
        }

        .iphone {
            width: 360px;
            height: 760px;
            background: #fff;
            border-radius: 60px;
            border: 12px solid transparent;
            background-image: linear-gradient(#fff, #fff), linear-gradient(to bottom right, #808000, #8fbc8f);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .dynamic-island {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 25px;
            background: linear-gradient(to bottom right, #808000, #8fbc8f);
            border-radius: 20px;
            z-index: 10;
        }

        .chat-header {
            background: #f8f8f8;
            padding: 60px 20px 15px;
            text-align: center;
            color: #333;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 80%;
            font-size: 1rem;
            line-height: 1.4;
        }

        .bot { background: #dbe6db; color: #000; align-self: flex-start; }
        .user { background: #007aff; color: #fff; align-self: flex-end; }

        .input-area {
            padding: 20px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
            background: #f8f8f8;
        }

        input {
            flex: 1;
            padding: 15px;
            border-radius: 25px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 1rem;
        }

        button {
            background: #8fbc8f;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back</a>

    <div class="background-broccoli"></div>

    <div class="iphone">
        <div class="dynamic-island"></div>
        <div class="chat-header">Broccoli Bot</div>
        <div class="chat-messages" id="chat">
            <div class="message bot">Hello! I am the Broccoli Facts Bot. Ask me anything about broccoli!</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            
            if (text === '') return;

            // Add user message
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerText = text;
            chat.appendChild(userMsg);

            // Clear input
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            // Bot Response
            try {
                const response = await fetch(window.location.origin + '/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                
                const botMsg = document.createElement('div');
                botMsg.className = 'message bot';
                botMsg.innerText = data.reply;
                chat.appendChild(botMsg);
                chat.scrollTop = chat.scrollHeight;
            } catch (error) {
                const botMsg = document.createElement('div');
                botMsg.className = 'message bot';
                botMsg.innerText = "I'm sorry, I'm having trouble processing your request right now.";
                chat.appendChild(botMsg);
                chat.scrollTop = chat.scrollHeight;
            }
        }

        // Handle Enter key
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
